<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마케케 관리자</title>
<link rel="icon" type="image/png" href="images/logo-icon.png">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --accent: #ff8c00;
  --accent-dark: #ff6b00;
  --text: #1a1a1a;
  --text-light: rgba(0,0,0,0.5);
  --white: #ffffff;
}

html { -webkit-font-smoothing: antialiased; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Helvetica, Arial, sans-serif;
  color: var(--text);
  background: #f5f5f7;
  line-height: 1.6;
  min-height: 100vh;
}

/* Nav */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 60px; height: 72px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.nav-logo {
  font-size: 22px; font-weight: 800; color: var(--text);
  text-decoration: none; letter-spacing: -0.5px;
}
.nav-logo span { color: var(--accent); }

.nav-right { display: flex; align-items: center; gap: 16px; }

.nav-link {
  text-decoration: none; color: var(--text); font-size: 14px;
  font-weight: 500; opacity: 0.6; transition: opacity 0.3s;
}
.nav-link:hover { opacity: 1; }

.login-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 24px; background: var(--text); color: var(--white);
  border-radius: 100px; font-size: 14px; font-weight: 600;
  border: none; cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

.user-profile {
  display: none; align-items: center; gap: 10px;
}
.user-profile img {
  width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
}
.user-profile span { font-size: 14px; font-weight: 600; }

.logout-btn {
  display: none; padding: 6px 16px; border: 1px solid rgba(0,0,0,0.1);
  border-radius: 100px; background: #fff; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
}
.logout-btn:hover { background: rgba(0,0,0,0.04); }

/* Access denied */
.access-denied {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; text-align: center;
  padding: 24px;
}
.access-denied h2 { font-size: 24px; margin-bottom: 8px; }
.access-denied p { font-size: 15px; color: var(--text-light); margin-bottom: 24px; }

/* Admin layout */
.admin-container {
  display: none; max-width: 1100px; margin: 0 auto;
  padding: 100px 24px 60px;
}

.admin-header {
  margin-bottom: 32px;
}
.admin-header h1 {
  font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
}
.admin-header p { font-size: 14px; color: var(--text-light); }

/* Tabs */
.admin-tabs {
  display: flex; gap: 4px; margin-bottom: 24px;
  background: #fff; border-radius: 14px; padding: 4px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.04);
}

.admin-tab {
  flex: 1; padding: 12px 16px; border: none; background: none;
  border-radius: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer; color: var(--text-light); transition: all 0.2s;
  text-align: center;
}
.admin-tab:hover { color: var(--text); background: rgba(0,0,0,0.03); }
.admin-tab.active {
  background: linear-gradient(135deg, #ff8c00, #ff6b00);
  color: #fff;
}

/* Panels */
.admin-panel {
  display: none;
}
.admin-panel.active { display: block; }

/* Cards */
.card {
  background: #fff; border-radius: 20px; padding: 32px;
  box-shadow: 0 2px 30px rgba(0,0,0,0.05); margin-bottom: 20px;
}

.card h3 {
  font-size: 18px; font-weight: 700; margin-bottom: 20px;
}

/* Stat boxes */
.stat-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px; margin-bottom: 24px;
}

.stat-box {
  background: rgba(255,140,0,0.06); border-radius: 14px;
  padding: 20px; text-align: center;
}
.stat-box .stat-number {
  font-size: 32px; font-weight: 800; color: var(--accent);
  line-height: 1;
}
.stat-box .stat-label {
  font-size: 12px; color: var(--text-light); margin-top: 6px;
  font-weight: 600;
}

/* Table */
.table-wrap {
  overflow-x: auto;
}
table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
th {
  text-align: left; padding: 12px 16px; font-weight: 700;
  font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-light); border-bottom: 2px solid rgba(0,0,0,0.06);
}
td {
  padding: 12px 16px; border-bottom: 1px solid rgba(0,0,0,0.04);
  vertical-align: middle;
}

/* OS ratio bar */
.ratio-bar {
  display: flex; height: 8px; border-radius: 4px; overflow: hidden;
  background: rgba(0,0,0,0.06); margin-bottom: 8px;
}
.ratio-bar .mac { background: var(--accent); }
.ratio-bar .win { background: #007aff; }

.ratio-labels {
  display: flex; justify-content: space-between; font-size: 12px;
  font-weight: 600;
}

/* Chart */
.chart-container {
  display: flex; align-items: flex-end; gap: 4px; height: 160px;
  padding-top: 20px;
}

/* Form */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 13px; font-weight: 700;
  margin-bottom: 6px; color: var(--text-light);
}
.form-group input, .form-group textarea {
  width: 100%; padding: 12px 16px; border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px; font-size: 14px; font-family: inherit;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus {
  outline: none; border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 100px; }

.save-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px;
  background: linear-gradient(135deg, #ff8c00, #ff6b00);
  color: #fff; border: none; border-radius: 100px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.save-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(255,140,0,0.3);
}
.save-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

/* CS filter buttons */
.cs-filter {
  padding: 8px 16px; border: 1px solid rgba(0,0,0,0.1);
  border-radius: 100px; background: #fff; font-size: 12px;
  font-weight: 600; cursor: pointer; transition: all 0.2s;
  color: var(--text-light);
}
.cs-filter:hover { border-color: var(--accent); color: var(--accent); }
.cs-filter.active {
  background: linear-gradient(135deg, #ff8c00, #ff6b00);
  color: #fff; border-color: transparent;
}

/* CS ticket card */
.cs-ticket-card {
  padding: 20px; background: #fff; border-radius: 16px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.04); margin-bottom: 10px;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
}
.cs-ticket-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

/* Badges */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.badge-category { background: rgba(255,140,0,0.1); color: #ff8c00; }
.badge-open { background: rgba(0,122,255,0.1); color: #007aff; }
.badge-in_progress { background: rgba(255,149,0,0.1); color: #ff9500; }
.badge-resolved { background: rgba(52,199,89,0.1); color: #34c759; }
.badge-on_hold { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.4); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 2000;
  align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.active { display: flex; }

.modal {
  background: #fff; border-radius: 24px; max-width: 640px; width: 100%;
  max-height: 85vh; overflow-y: auto; padding: 36px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.modal-close {
  float: right; width: 36px; height: 36px; border-radius: 50%;
  background: rgba(0,0,0,0.05); border: none; cursor: pointer;
  font-size: 18px; font-weight: 700; color: var(--text-light);
  line-height: 36px; text-align: center; transition: background 0.2s;
}
.modal-close:hover { background: rgba(0,0,0,0.1); }

/* Reply items */
.reply-item {
  padding: 16px; border-radius: 12px; margin-bottom: 10px;
  font-size: 13px; line-height: 1.7;
}
.reply-admin {
  background: rgba(255,140,0,0.06); border-left: 3px solid var(--accent);
}
.reply-user {
  background: rgba(0,0,0,0.03); border-left: 3px solid rgba(0,0,0,0.15);
}

/* Category stat bar */
.category-stat-item {
  flex: 1; min-width: 100px; text-align: center;
  padding: 12px; background: rgba(255,140,0,0.04);
  border-radius: 10px;
}
.category-stat-item .count { font-size: 22px; font-weight: 800; color: var(--accent); }
.category-stat-item .label { font-size: 11px; color: var(--text-light); font-weight: 600; margin-top: 2px; }

/* Responsive */
@media (max-width: 768px) {
  .nav { padding: 0 20px; }
  .admin-container { padding: 90px 12px 40px; }
  .admin-tabs { flex-wrap: wrap; }
  .admin-tab { font-size: 12px; padding: 10px 12px; }
  .card { padding: 20px; }
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="images/logo-icon.png" style="width:32px;height:32px;border-radius:8px;vertical-align:middle;margin-right:8px;">
    <span>M</span>akeke
  </a>
  <div class="nav-right">
    <a href="index.html" class="nav-link">홈</a>
    <a href="download.html" class="nav-link">다운로드</a>
    <a href="support.html" class="nav-link">고객지원</a>
    <button id="loginBtn" class="login-btn" onclick="loginWithGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      로그인
    </button>
    <div id="userProfile" class="user-profile">
      <img id="userPhoto" src="" alt="프로필">
      <span id="userName"></span>
    </div>
    <button id="logoutBtn" class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
</nav>

<!-- 접근 불가 -->
<div id="accessDenied" class="access-denied">
  <div style="font-size:56px;margin-bottom:16px;">🔐</div>
  <h2>관리자 전용 페이지</h2>
  <p>이 페이지는 관리자만 접근할 수 있습니다.</p>
  <button class="login-btn" onclick="loginWithGoogle()" id="adminLoginBtn">Google로 로그인</button>
</div>

<!-- 관리자 콘텐츠 -->
<div id="adminContainer" class="admin-container">
  <div class="admin-header">
    <h1>관리자 대시보드</h1>
    <p>마케케 서비스 관리</p>
  </div>

  <!-- 탭 -->
  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="users" onclick="switchTab('users')">사용자</button>
    <button class="admin-tab" data-tab="downloads" onclick="switchTab('downloads')">다운로드</button>
    <button class="admin-tab" data-tab="config" onclick="switchTab('config')">설정</button>
    <button class="admin-tab" data-tab="notices" onclick="switchTab('notices')">공지사항</button>
    <button class="admin-tab" data-tab="cs" onclick="switchTab('cs')">CS 관리</button>
  </div>

  <!-- ===== 사용자 패널 ===== -->
  <div id="panel-users" class="admin-panel active">
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-number" id="totalUsers">0</div>
        <div class="stat-label">전체 가입자</div>
      </div>
    </div>
    <div class="card">
      <h3>사용자 목록</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>이름</th>
              <th>이메일</th>
              <th>마지막 로그인</th>
              <th>다운로드</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr><td colspan="4" style="text-align:center;padding:24px;color:rgba(0,0,0,0.4);">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ===== 다운로드 패널 ===== -->
  <div id="panel-downloads" class="admin-panel">
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-number" id="totalDownloads">0</div>
        <div class="stat-label">총 다운로드</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="macDownloads">0</div>
        <div class="stat-label">macOS</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="winDownloads">0</div>
        <div class="stat-label">Windows</div>
      </div>
    </div>

    <div class="card">
      <h3>OS별 비율</h3>
      <div class="ratio-bar">
        <div class="mac" id="macBar" style="width:50%;"></div>
        <div class="win" id="winBar" style="width:50%;"></div>
      </div>
      <div class="ratio-labels">
        <span style="color:var(--accent);">macOS <span id="macPct">-</span></span>
        <span style="color:#007aff;">Windows <span id="winPct">-</span></span>
      </div>
    </div>

    <div class="card">
      <h3>일별 다운로드 (최근 14일)</h3>
      <div class="chart-container" id="downloadChart"></div>
    </div>
  </div>

  <!-- ===== 설정 패널 ===== -->
  <div id="panel-config" class="admin-panel">
    <div class="card">
      <h3>다운로드 URL 관리</h3>
      <div class="form-group">
        <label>macOS 다운로드 URL (.dmg)</label>
        <input type="url" id="cfgMacURL" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>Windows 다운로드 URL (.exe)</label>
        <input type="url" id="cfgWinURL" placeholder="https://...">
      </div>
    </div>

    <div class="card">
      <h3>버전 관리</h3>
      <div class="form-group">
        <label>최신 버전</label>
        <input type="text" id="cfgVersion" placeholder="1.0.0">
      </div>
      <div class="form-group">
        <label>변경사항 (Changelog)</label>
        <textarea id="cfgChangelog" rows="6" placeholder="v1.0.0&#10;- 최초 출시&#10;- 블로그 자동 작성 기능&#10;- 카드뉴스 생성 기능"></textarea>
      </div>
    </div>

    <button class="save-btn" id="saveConfigBtn" onclick="saveConfig()">설정 저장</button>
  </div>

  <!-- ===== 공지사항 패널 ===== -->
  <div id="panel-notices" class="admin-panel">
    <div class="card">
      <h3>새 공지 작성</h3>
      <div class="form-group">
        <label>제목</label>
        <input type="text" id="noticeTitle" placeholder="공지 제목">
      </div>
      <div class="form-group">
        <label>내용</label>
        <textarea id="noticeContent" rows="3" placeholder="공지 내용 (선택)"></textarea>
      </div>
      <button class="save-btn" onclick="addNotice()">공지 등록</button>
    </div>

    <div class="card">
      <h3>공지 목록</h3>
      <div id="noticeList">
        <div style="text-align:center;padding:24px;color:rgba(0,0,0,0.4);">로딩 중...</div>
      </div>
    </div>
  </div>

  <!-- ===== CS 관리 패널 ===== -->
  <div id="panel-cs" class="admin-panel">
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-number" id="csTotalTickets">0</div>
        <div class="stat-label">총 문의</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="csOpenTickets">0</div>
        <div class="stat-label">미처리</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="csAvgTime">-</div>
        <div class="stat-label">평균 처리시간</div>
      </div>
    </div>

    <div class="card">
      <h3>카테고리별 비율</h3>
      <div id="csCategoryStats" style="display:flex;gap:12px;flex-wrap:wrap;"></div>
    </div>

    <!-- 필터 -->
    <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="cs-filter active" data-filter="all" onclick="filterCSTickets('all')">전체</button>
      <button class="cs-filter" data-filter="open" onclick="filterCSTickets('open')">접수</button>
      <button class="cs-filter" data-filter="in_progress" onclick="filterCSTickets('in_progress')">처리중</button>
      <button class="cs-filter" data-filter="resolved" onclick="filterCSTickets('resolved')">완료</button>
      <button class="cs-filter" data-filter="on_hold" onclick="filterCSTickets('on_hold')">보류</button>
    </div>

    <div id="csTicketList">
      <div style="text-align:center;padding:24px;color:rgba(0,0,0,0.4);">로딩 중...</div>
    </div>
  </div>

  <!-- CS 상세 모달 -->
  <div class="modal-overlay" id="csModal">
    <div class="modal">
      <button class="modal-close" onclick="closeCSModal()">&times;</button>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
        <span id="csModalCategory" class="badge badge-category"></span>
        <span id="csModalStatus" class="badge"></span>
        <span id="csModalDate" style="font-size:12px;color:rgba(0,0,0,0.4);"></span>
      </div>
      <h2 id="csModalTitle" style="font-size:20px;font-weight:800;margin-bottom:6px;padding-right:40px;"></h2>
      <div style="font-size:12px;color:rgba(0,0,0,0.4);margin-bottom:16px;">
        <span id="csModalEmail"></span> · <span id="csModalName"></span>
      </div>
      <div id="csModalContent" style="font-size:14px;line-height:1.8;margin-bottom:24px;white-space:pre-wrap;"></div>
      <img id="csModalScreenshot" style="max-width:100%;border-radius:12px;margin-bottom:24px;display:none;">

      <!-- 상태 변경 -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:16px;background:rgba(0,0,0,0.02);border-radius:12px;">
        <label style="font-size:13px;font-weight:700;color:rgba(0,0,0,0.5);white-space:nowrap;">상태 변경</label>
        <select id="csModalStatusSelect" style="flex:1;padding:8px 12px;border:1px solid rgba(0,0,0,0.1);border-radius:8px;font-size:13px;font-family:inherit;">
          <option value="open">접수</option>
          <option value="in_progress">처리중</option>
          <option value="resolved">완료</option>
          <option value="on_hold">보류</option>
        </select>
        <button onclick="saveTicketStatus()" style="padding:8px 16px;background:linear-gradient(135deg,#ff8c00,#ff6b00);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">변경</button>
      </div>

      <!-- 답변 목록 -->
      <div style="border-top:1px solid rgba(0,0,0,0.06);padding-top:20px;">
        <h4 style="font-size:15px;font-weight:700;margin-bottom:16px;">답변</h4>
        <div id="csModalReplies"></div>
        <!-- 답변 작성 -->
        <div style="margin-top:16px;">
          <textarea id="csReplyText" placeholder="답변 내용을 입력하세요" style="width:100%;padding:12px 16px;border:1px solid rgba(0,0,0,0.1);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:80px;"></textarea>
          <button onclick="submitAdminReply()" style="margin-top:8px;padding:10px 24px;background:linear-gradient(135deg,#ff8c00,#ff6b00);color:#fff;border:none;border-radius:100px;font-size:13px;font-weight:700;cursor:pointer;">답변 등록</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="admin.js"></script>

</body>
</html>

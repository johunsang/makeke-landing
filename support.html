<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객지원 — 마케케 (Makeke)</title>
<link rel="icon" type="image/png" href="images/logo-icon.png">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --accent: #ff8c00;
  --accent-dark: #ff6b00;
  --accent-rgb: 255,140,0;
  --text: #1a1a1a;
  --text-light: rgba(0,0,0,0.5);
  --white: #ffffff;
  --success: #34c759;
  --error: #ff3b30;
  --warning: #ff9500;
  --info: #007aff;
}

html { -webkit-font-smoothing: antialiased; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Helvetica, Arial, sans-serif;
  color: var(--text);
  background: #f5f5f7;
  line-height: 1.6;
  min-height: 100vh;
}

/* Nav */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 60px; height: 72px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.nav-logo {
  font-size: 22px; font-weight: 800; color: var(--text);
  text-decoration: none; letter-spacing: -0.5px;
}
.nav-logo span { color: var(--accent); }

.nav-right { display: flex; align-items: center; gap: 16px; }

.nav-link {
  text-decoration: none; color: var(--text); font-size: 14px;
  font-weight: 500; opacity: 0.6; transition: opacity 0.3s;
}
.nav-link:hover { opacity: 1; }
.nav-link.active { opacity: 1; color: var(--accent); }

.login-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 24px; background: var(--text); color: var(--white);
  border-radius: 100px; font-size: 14px; font-weight: 600;
  border: none; cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

.user-profile {
  display: none; align-items: center; gap: 10px;
}
.user-profile img {
  width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
}
.user-profile span { font-size: 14px; font-weight: 600; }

.logout-btn {
  display: none; padding: 6px 16px; border: 1px solid rgba(0,0,0,0.1);
  border-radius: 100px; background: #fff; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
}
.logout-btn:hover { background: rgba(0,0,0,0.04); }

/* Container */
.support-container {
  max-width: 900px; margin: 0 auto;
  padding: 100px 24px 60px;
}

.support-header {
  margin-bottom: 32px;
}
.support-header h1 {
  font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
}
.support-header p { font-size: 14px; color: var(--text-light); margin-top: 4px; }

/* Login prompt */
.login-prompt {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; text-align: center;
  padding: 24px;
}
.login-prompt h2 { font-size: 24px; margin-bottom: 8px; }
.login-prompt p { font-size: 15px; color: var(--text-light); margin-bottom: 24px; }

/* Tabs */
.support-tabs {
  display: flex; gap: 4px; margin-bottom: 24px;
  background: #fff; border-radius: 14px; padding: 4px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.04);
}

.support-tab {
  flex: 1; padding: 12px 16px; border: none; background: none;
  border-radius: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer; color: var(--text-light); transition: all 0.2s;
  text-align: center;
}
.support-tab:hover { color: var(--text); background: rgba(0,0,0,0.03); }
.support-tab.active {
  background: linear-gradient(135deg, #ff8c00, #ff6b00);
  color: #fff;
}

/* Panels */
.support-panel { display: none; }
.support-panel.active { display: block; }

/* Card */
.card {
  background: #fff; border-radius: 20px; padding: 32px;
  box-shadow: 0 2px 30px rgba(0,0,0,0.05); margin-bottom: 20px;
}
.card h3 {
  font-size: 18px; font-weight: 700; margin-bottom: 20px;
}

/* Form */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 13px; font-weight: 700;
  margin-bottom: 6px; color: var(--text-light);
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 12px 16px; border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px; font-size: 14px; font-family: inherit;
  transition: border-color 0.2s; background: #fff;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none; border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 120px; }

.form-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}

/* Screenshot upload */
.screenshot-area {
  border: 2px dashed rgba(0,0,0,0.1); border-radius: 12px;
  padding: 24px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.screenshot-area:hover { border-color: var(--accent); background: rgba(255,140,0,0.03); }
.screenshot-area input { display: none; }
.screenshot-area .label { font-size: 13px; color: var(--text-light); }
.screenshot-area .label svg { display: block; margin: 0 auto 8px; }
.screenshot-preview {
  max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 12px;
  display: none;
}
.screenshot-remove {
  display: none; position: absolute; top: 8px; right: 8px;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,59,48,0.1); color: #ff3b30;
  border: none; cursor: pointer; font-size: 16px; font-weight: 700;
  line-height: 28px;
}

/* Submit btn */
.submit-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 32px;
  background: linear-gradient(135deg, #ff8c00, #ff6b00);
  color: #fff; border: none; border-radius: 100px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.submit-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(255,140,0,0.3);
}
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

/* Ticket list */
.ticket-item {
  padding: 20px; background: #fff; border-radius: 16px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.04); margin-bottom: 12px;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
}
.ticket-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

.ticket-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  flex-wrap: wrap;
}

.ticket-title {
  font-size: 15px; font-weight: 700; flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.ticket-meta {
  font-size: 12px; color: var(--text-light);
}

.ticket-preview {
  font-size: 13px; color: rgba(0,0,0,0.5); margin-top: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Badge */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.badge-category {
  background: rgba(255,140,0,0.1); color: #ff8c00;
}
.badge-open { background: rgba(0,122,255,0.1); color: #007aff; }
.badge-in_progress { background: rgba(255,149,0,0.1); color: #ff9500; }
.badge-resolved { background: rgba(52,199,89,0.1); color: #34c759; }
.badge-on_hold { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.4); }

/* Empty state */
.empty-state {
  text-align: center; padding: 48px 24px; color: var(--text-light);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 2000;
  align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.active { display: flex; }

.modal {
  background: #fff; border-radius: 24px; max-width: 640px; width: 100%;
  max-height: 85vh; overflow-y: auto; padding: 36px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.modal-close {
  float: right; width: 36px; height: 36px; border-radius: 50%;
  background: rgba(0,0,0,0.05); border: none; cursor: pointer;
  font-size: 18px; font-weight: 700; color: var(--text-light);
  line-height: 36px; text-align: center; transition: background 0.2s;
}
.modal-close:hover { background: rgba(0,0,0,0.1); }

.modal h2 {
  font-size: 20px; font-weight: 800; margin-bottom: 20px; padding-right: 40px;
}

.modal-content { font-size: 14px; line-height: 1.8; margin-bottom: 24px; white-space: pre-wrap; }

.modal-screenshot {
  max-width: 100%; border-radius: 12px; margin-bottom: 24px;
}

/* Reply section */
.replies-section { margin-top: 24px; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 20px; }
.replies-section h4 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }

.reply-item {
  padding: 16px; border-radius: 12px; margin-bottom: 10px;
  font-size: 13px; line-height: 1.7;
}
.reply-admin {
  background: rgba(255,140,0,0.06); border-left: 3px solid var(--accent);
}
.reply-user {
  background: rgba(0,0,0,0.03); border-left: 3px solid rgba(0,0,0,0.15);
}
.reply-meta {
  font-size: 11px; color: var(--text-light); margin-bottom: 6px; font-weight: 600;
}

/* Footer */
.footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 32px 60px; font-size: 13px; color: rgba(0,0,0,0.4);
  border-top: 1px solid rgba(0,0,0,0.05); margin-top: 40px;
}
.footer a { color: rgba(0,0,0,0.4); text-decoration: none; }
.footer a:hover { color: var(--accent); }

/* Responsive */
@media (max-width: 768px) {
  .nav { padding: 0 20px; }
  .nav-right { gap: 8px; }
  .nav-link { font-size: 12px; }
  .support-container { padding: 90px 12px 40px; }
  .support-tabs { flex-wrap: wrap; }
  .support-tab { font-size: 12px; padding: 10px 12px; }
  .card { padding: 20px; }
  .form-row { grid-template-columns: 1fr; }
  .modal { padding: 24px; border-radius: 16px; }
  .footer { flex-direction: column; gap: 12px; padding: 24px 20px; text-align: center; }
}
</style>
</head>

<!-- 메인 콘텐츠 -->
<div id="supportMain" class="support-container" style="display:none;">

            <option value="bug">버그 신고</option>
            <option value="feature">기능 요청</option>

          </select>

<script>
// ============================================================
// support.js — 고객지원 페이지 기능
// ============================================================

let currentUser = null;
let screenshotBase64 = null;

const CATEGORY_LABELS = {
  bug: '버그 신고',
  feature: '기능 요청',
  question: '사용법 질문',
  billing: '결제/환불',
  other: '기타'
};

const STATUS_LABELS = {
  open: '접수',
  in_progress: '처리중',
  resolved: '완료',
  on_hold: '보류'
};

// ────────────────────────────────────────
// 인증 상태 감시
// ────────────────────────────────────────
auth.onAuthStateChanged((user) => {
  const loginPrompt = document.getElementById('loginPrompt');
  const supportMain = document.getElementById('supportMain');

  if (user) {
    currentUser = user;
    loginPrompt.style.display = 'none';
    supportMain.style.display = 'block';
    document.getElementById('ticketEmail').value = user.email || '';
    loadMyTickets();
  } else {
    currentUser = null;
    loginPrompt.style.display = 'flex';
    supportMain.style.display = 'none';
  }
});

// ────────────────────────────────────────
// 탭 전환
// ────────────────────────────────────────
function switchSupportTab(tabName) {
  document.querySelectorAll('.support-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.support-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.support-tab[data-tab="${tabName}"]`).classList.add('active');
  document.getElementById('panel-' + tabName).classList.add('active');
  if (tabName === 'history') loadMyTickets();
}

// ────────────────────────────────────────
// 스크린샷 처리
// ────────────────────────────────────────
function handleScreenshot(input) {
  const file = input.files[0];
  if (!file) return;

  if (file.size > 1024 * 1024) {
    alert('스크린샷은 1MB 이하만 첨부 가능합니다.');
    input.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    screenshotBase64 = e.target.result;
    document.getElementById('screenshotPreview').src = screenshotBase64;
    document.getElementById('screenshotPreview').style.display = 'block';
    document.getElementById('screenshotLabel').style.display = 'none';
    document.getElementById('screenshotRemove').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function removeScreenshot() {
  screenshotBase64 = null;
  document.getElementById('screenshotInput').value = '';
  document.getElementById('screenshotPreview').style.display = 'none';
  document.getElementById('screenshotPreview').src = '';
  document.getElementById('screenshotLabel').style.display = 'block';
  document.getElementById('screenshotRemove').style.display = 'none';
}

// ────────────────────────────────────────
// 문의 등록
// ────────────────────────────────────────
async function submitTicket() {
  if (!currentUser) { alert('로그인이 필요합니다.'); return; }

  const title = document.getElementById('ticketTitle').value.trim();
  const content = document.getElementById('ticketContent').value.trim();
  const category = document.getElementById('ticketCategory').value;
  const email = document.getElementById('ticketEmail').value.trim();

  if (!title) { alert('제목을 입력해주세요.'); return; }
  if (!content) { alert('내용을 입력해주세요.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '등록 중...';

  try {
    const ticketData = {
      userId: currentUser.uid,
      userEmail: email || currentUser.email,
      userName: currentUser.displayName || '',
      category: category,
      title: title,
      content: content,
      status: 'open',
      replies: [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    if (screenshotBase64) {
      ticketData.screenshot = screenshotBase64;
    }

    await db.collection('tickets').add(ticketData);

    // 폼 초기화
    document.getElementById('ticketTitle').value = '';
    document.getElementById('ticketContent').value = '';
    document.getElementById('ticketCategory').value = 'bug';
    removeScreenshot();

    btn.textContent = '등록 완료!';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '문의 등록';
    }, 1500);

    // 내 문의 내역 탭으로 전환
    switchSupportTab('history');

  } catch (e) {
    console.error('문의 등록 오류:', e);
    alert('문의 등록에 실패했습니다. 다시 시도해주세요.');
    btn.disabled = false;
    btn.textContent = '문의 등록';
  }
}

// ────────────────────────────────────────
// 내 문의 목록 로드
// ────────────────────────────────────────
async function loadMyTickets() {
  if (!currentUser) return;

  const listEl = document.getElementById('ticketList');
  listEl.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>로딩 중...</p></div>';

  try {
    const snapshot = await db.collection('tickets')
      .where('userId', '==', currentUser.uid)
      .orderBy('createdAt', 'desc')
      .get();

    if (snapshot.empty) {
      listEl.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>등록된 문의가 없습니다.</p></div>';
      return;
    }

    listEl.innerHTML = '';
    snapshot.forEach(doc => {
      const t = doc.data();
      const createdAt = t.createdAt ? t.createdAt.toDate().toLocaleString('ko-KR') : '-';
      const div = document.createElement('div');
      div.className = 'ticket-item';
      div.onclick = () => openTicketModal(doc.id, t);
      div.innerHTML = `
        <div class="ticket-header">
          <span class="badge badge-category">${CATEGORY_LABELS[t.category] || t.category}</span>
          <span class="badge badge-${t.status}">${STATUS_LABELS[t.status] || t.status}</span>
          <span class="ticket-title">${escapeHtml(t.title)}</span>
        </div>
        <div class="ticket-preview">${escapeHtml(t.content)}</div>
        <div class="ticket-meta">${createdAt}${t.replies && t.replies.length > 0 ? ' · 답변 ' + t.replies.length + '건' : ''}</div>
      `;
      listEl.appendChild(div);
    });

  } catch (e) {
    console.error('문의 목록 로드 오류:', e);
    listEl.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>데이터를 불러올 수 없습니다.</p></div>';
  }
}

// ────────────────────────────────────────
// 문의 상세 모달
// ────────────────────────────────────────
function openTicketModal(ticketId, ticket) {
  document.getElementById('modalCategory').textContent = CATEGORY_LABELS[ticket.category] || ticket.category;
  document.getElementById('modalStatus').textContent = STATUS_LABELS[ticket.status] || ticket.status;
  document.getElementById('modalStatus').className = 'badge badge-' + ticket.status;
  document.getElementById('modalDate').textContent = ticket.createdAt ? ticket.createdAt.toDate().toLocaleString('ko-KR') : '';
  document.getElementById('modalTitle').textContent = ticket.title;
  document.getElementById('modalContent').textContent = ticket.content;

  // 스크린샷
  const screenshotEl = document.getElementById('modalScreenshot');
  if (ticket.screenshot) {
    screenshotEl.src = ticket.screenshot;
    screenshotEl.style.display = 'block';
  } else {
    screenshotEl.style.display = 'none';
  }

  // 답변
  const repliesSection = document.getElementById('repliesSection');
  const repliesList = document.getElementById('repliesList');
  if (ticket.replies && ticket.replies.length > 0) {
    repliesSection.style.display = 'block';
    repliesList.innerHTML = ticket.replies.map(r => {
      const replyDate = r.createdAt ? (r.createdAt.toDate ? r.createdAt.toDate().toLocaleString('ko-KR') : new Date(r.createdAt).toLocaleString('ko-KR')) : '';
      return `
        <div class="reply-item ${r.isAdmin ? 'reply-admin' : 'reply-user'}">
          <div class="reply-meta">${r.isAdmin ? '관리자' : r.author || '사용자'} · ${replyDate}</div>
          <div style="white-space:pre-wrap;">${escapeHtml(r.content)}</div>
        </div>
      `;
    }).join('');
  } else {
    repliesSection.style.display = 'none';
  }

  document.getElementById('ticketModal').classList.add('active');
}

function closeTicketModal() {
  document.getElementById('ticketModal').classList.remove('active');
}

// ESC키로 모달 닫기
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeTicketModal();
});

// 모달 외부 클릭으로 닫기
document.getElementById('ticketModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeTicketModal();
});

// ────────────────────────────────────────
// 유틸
// ────────────────────────────────────────
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
